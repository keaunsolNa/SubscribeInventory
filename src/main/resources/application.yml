server:
  port: ${PORT:8080}

spring:
  application:
    name: subscription-dashboard-api

# security.access-token: set ACCESS_TOKEN on public deployments to require the X-Access-Token
#   header on /api/** (except /api/health). Leave empty for open local use.
# providers: each one is active only when enabled AND its api-key is non-blank.
#   Supply keys via environment variables; never commit real keys.
#   monthly-fee is the fixed subscription cost in KRW (not a secret); the dashboard
#   pre-fills each card with it. Omit the line to leave the fee blank.
# alerts: active only when SLACK_WEBHOOK_URL is set. POST /api/alerts/check (token-protected)
#   sweeps usage with the server-side keys and posts threshold breaches to Slack.
#   cost-max-usd is off unless DASHBOARD_ALERTS_COST_MAX_USD is provided.
dashboard:
  security:
    access-token: ${ACCESS_TOKEN:}
  alerts:
    webhook-url: ${SLACK_WEBHOOK_URL:}
    quota-warn-percent: 80
    balance-min-usd: 5
  providers:
    elevenlabs:
      enabled: true
      base-url: https://api.elevenlabs.io
      api-key: ${ELEVENLABS_API_KEY:}
      # monthly-fee: 7000
    xai:
      enabled: true
      base-url: https://management-api.x.ai
      api-key: ${XAI_MANAGEMENT_KEY:}
      team-id: ${XAI_TEAM_ID:}
      # monthly-fee: 0
    openai:
      enabled: true
      base-url: https://api.openai.com
      api-key: ${OPENAI_ADMIN_KEY:}
      # monthly-fee: 0
    anthropic:
      enabled: true
      base-url: https://api.anthropic.com
      api-key: ${ANTHROPIC_ADMIN_KEY:}
      # monthly-fee: 0
