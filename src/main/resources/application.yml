server:
  port: ${PORT:8080}
  # Behind Cloud Run's proxy the container sees http; honor X-Forwarded-* so same-origin
  # detection (CORS) and generated URLs use the real https scheme.
  forward-headers-strategy: framework

spring:
  application:
    name: subscription-dashboard-api

# security.access-token: set ACCESS_TOKEN on public deployments to require the X-Access-Token
#   header on /api/** (except /api/health). Leave empty for open local use.
# providers: each one is active only when enabled AND its api-key is non-blank.
#   Supply keys via environment variables; never commit real keys.
#   monthly-fee is the fixed subscription cost in KRW (not a secret); the dashboard
#   pre-fills each card with it. Omit the line to leave the fee blank.
# alerts: multi-user subscriptions. Active only when ENCRYPTION_KEY (base64 32-byte AES key)
#   and GCP_PROJECT_ID (Firestore project) are both set — i.e. on deployments. Users subscribe
#   from the dashboard (POST /api/alerts/subscriptions); Cloud Scheduler sweeps hourly via
#   POST /api/alerts/check. Threshold values below are the subscription defaults.
# auth: Google-login mode activates when GOOGLE_CLIENT_ID and JWT_SECRET are both set;
#   otherwise the shared ACCESS_TOKEN (or fully open local mode) stays in effect.
dashboard:
  security:
    access-token: ${ACCESS_TOKEN:}
  auth:
    google-client-id: ${GOOGLE_CLIENT_ID:}
    jwt-secret: ${JWT_SECRET:}
  alerts:
    encryption-key: ${ENCRYPTION_KEY:}
    old-encryption-keys: ${ENCRYPTION_OLD_KEYS:}
    budget-slack-webhook: ${BUDGET_SLACK_WEBHOOK:}
    feedback-slack-webhook: ${FEEDBACK_SLACK_WEBHOOK:}
    project-id: ${GCP_PROJECT_ID:}
    quota-warn-percent: 80
    balance-min-usd: 5
  providers:
    elevenlabs:
      enabled: true
      base-url: https://api.elevenlabs.io
      api-key: ${ELEVENLABS_API_KEY:}
      # monthly-fee: 7000
    xai:
      enabled: true
      base-url: https://management-api.x.ai
      api-key: ${XAI_MANAGEMENT_KEY:}
      team-id: ${XAI_TEAM_ID:}
      # monthly-fee: 0
    openai:
      enabled: true
      base-url: https://api.openai.com
      api-key: ${OPENAI_ADMIN_KEY:}
      # monthly-fee: 0
    anthropic:
      enabled: true
      base-url: https://api.anthropic.com
      api-key: ${ANTHROPIC_ADMIN_KEY:}
      # monthly-fee: 0
    deepseek:
      enabled: true
      base-url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY:}
    openrouter:
      enabled: true
      base-url: https://openrouter.ai
      api-key: ${OPENROUTER_API_KEY:}
    stability:
      enabled: true
      base-url: https://api.stability.ai
      api-key: ${STABILITY_API_KEY:}
    fal:
      enabled: true
      base-url: https://api.fal.ai
      api-key: ${FAL_API_KEY:}
